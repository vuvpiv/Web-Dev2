<div class="page">
  <header class="header">
    <h1 class="logo">Online Store</h1>

    <nav class="cats">
      @for (c of categories; track c.id) {
        <button
          type="button"
          class="cat"
          [class.active]="selectedCategoryId() === c.id"
          (click)="selectCategory(c.id)"
        >
          {{ c.name }}
        </button>
      }

      <button type="button" class="cat ghost" (click)="clearCategory()">Reset</button>
    </nav>
  </header>

  <main class="main">
    @if (selectedCategoryId() === null) {
      <div class="welcome">
        <h2>Select a category</h2>
        <p>Choose one of the categories above to view products.</p>
      </div>
    } @else {
      <app-product-list [products]="selectedProducts()"></app-product-list>
    }
  </main>
</div>
